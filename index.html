<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eindbazen Sync Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sky / cloud layer -->
  <div class="sky">
    <span class="cloud cloud--1"></span>
    <span class="cloud cloud--2"></span>
    <span class="cloud cloud--3"></span>
  </div>

  <!-- Endboss scene (behind everything interactive) -->
  <div class="stage" aria-hidden="true">
    <div class="endboss" data-state="idle">
      <div class="boss-body">
        <div class="boss-head">
          <div class="boss-hair">
            <span class="hair-tuft hair-tuft--1"></span>
            <span class="hair-tuft hair-tuft--2"></span>
            <span class="hair-tuft hair-tuft--3"></span>
            <span class="hair-tuft hair-tuft--4"></span>
            <span class="hair-tuft hair-tuft--5"></span>
          </div>
          <div class="boss-horn boss-horn--left"></div>
          <div class="boss-horn boss-horn--right"></div>
          <div class="boss-brow boss-brow--left"></div>
          <div class="boss-brow boss-brow--right"></div>
          <div class="boss-eye boss-eye--left"><span class="pupil"></span></div>
          <div class="boss-eye boss-eye--right"><span class="pupil"></span></div>
          <div class="boss-snout">
            <div class="boss-nostril boss-nostril--left"></div>
            <div class="boss-nostril boss-nostril--right"></div>
            <div class="boss-mouth">
              <div class="boss-fang boss-fang--left"></div>
              <div class="boss-fang boss-fang--right"></div>
            </div>
          </div>
          <div class="boss-zzz" aria-hidden="true"><span>z</span><span>Z</span><span>z</span></div>
        </div>
        <div class="boss-torso">
          <div class="boss-shoulder boss-shoulder--left">
            <span class="shoulder-spike"></span>
            <span class="shoulder-spike"></span>
            <span class="shoulder-spike"></span>
          </div>
          <div class="boss-shoulder boss-shoulder--right">
            <span class="shoulder-spike"></span>
            <span class="shoulder-spike"></span>
            <span class="shoulder-spike"></span>
          </div>
          <div class="boss-belly"></div>
          <div class="boss-shell">
            <div class="shell-spike shell-spike--1"></div>
            <div class="shell-spike shell-spike--2"></div>
            <div class="shell-spike shell-spike--3"></div>
            <div class="shell-spike shell-spike--4"></div>
            <div class="shell-spike shell-spike--5"></div>
          </div>
          <div class="boss-arm boss-arm--left">
            <div class="boss-band">
              <span class="band-spike"></span>
              <span class="band-spike"></span>
              <span class="band-spike"></span>
              <span class="band-spike"></span>
            </div>
            <div class="boss-claw">
              <span class="claw-nail"></span>
              <span class="claw-nail"></span>
              <span class="claw-nail"></span>
            </div>
          </div>
          <div class="boss-arm boss-arm--right">
            <div class="boss-band">
              <span class="band-spike"></span>
              <span class="band-spike"></span>
              <span class="band-spike"></span>
              <span class="band-spike"></span>
            </div>
            <div class="boss-claw">
              <span class="claw-nail"></span>
              <span class="claw-nail"></span>
              <span class="claw-nail"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="laptop">
        <div class="laptop-lid">
          <div class="laptop-screen">
            <div class="ide">
              <div class="ide-titlebar">
                <span class="ide-dot ide-dot--r"></span>
                <span class="ide-dot ide-dot--y"></span>
                <span class="ide-dot ide-dot--g"></span>
                <span class="ide-title">EINDBAZEN.EXE &mdash; agent</span>
              </div>
              <div class="ide-body">
                <div class="ide-line"><span class="ide-lineno">1</span><span class="ide-prompt">&gt;</span> <span class="ide-user">plan standup sync</span></div>
                <div class="ide-line"><span class="ide-lineno">2</span><span class="ide-ghost">&nbsp;&nbsp;summarizing blockers&hellip;</span></div>
                <div class="ide-line"><span class="ide-lineno">3</span><span class="ide-prompt">&gt;</span> <span class="ide-user">draft retro notes</span></div>
                <div class="ide-line"><span class="ide-lineno">4</span><span class="ide-ghost">&nbsp;&nbsp;querying <span class="ide-kw">eindbazen</span>.notes&hellip;</span></div>
                <div class="ide-line ide-line--active">
                  <span class="ide-lineno">5</span><span class="ide-prompt">&gt;</span>
                  <span id="ideTyping" class="ide-typed"></span><span id="ideCaret" class="ide-caret"></span>
                </div>
                <div id="ideError" class="ide-error hidden">
                  <span class="ide-error-icon">&#9888;</span>
                  <span class="ide-error-text">error: out of tokens</span>
                </div>
                <!-- Bug error overlay: visible while topi is on the laptop -->
                <div class="ide-bug-error" aria-hidden="true">
                  <div class="ide-bug-code">500</div>
                  <div class="ide-bug-msg">oops daar ging iets mis</div>
                </div>
                <div id="ideRsi" class="ide-rsi hidden" aria-hidden="true">
                  <div class="ide-rsi-text">RSI break</div>
                  <div class="ide-rsi-bar"><div class="ide-rsi-bar-fill"></div></div>
                </div>
                <div id="ideDeploy" class="ide-deploy hidden" aria-hidden="true">
                  <div class="ide-deploy-text">
                    <div class="ide-deploy-line" id="ideDeployLine1"></div>
                    <div class="ide-deploy-line ide-deploy-warning" id="ideDeployLine2"></div>
                    <span id="ideDeployCaret" class="ide-deploy-caret">&#9608;</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="laptop-base"><div class="laptop-hinge"></div></div>
      </div>
    </div>

    <!-- Topi the chameleon — walks across scene during running sessions -->
    <div class="topi" aria-hidden="true">
      <div class="topi-tail">
        <span class="topi-tail-seg topi-tail-seg--1"></span>
        <span class="topi-tail-seg topi-tail-seg--2"></span>
        <span class="topi-tail-seg topi-tail-seg--3"></span>
        <span class="topi-tail-seg topi-tail-seg--4"></span>
        <span class="topi-tail-seg topi-tail-seg--5"></span>
        <span class="topi-tail-seg topi-tail-seg--6"></span>
      </div>
      <div class="topi-body">
        <span class="topi-crest"></span>
        <span class="topi-belly"></span>
      </div>
      <div class="topi-head">
        <span class="topi-snout"></span>
        <span class="topi-mouth"></span>
        <div class="topi-eye topi-eye--l">
          <span class="topi-pupil"></span>
          <span class="topi-glint"></span>
        </div>
        <div class="topi-eye topi-eye--r">
          <span class="topi-pupil"></span>
          <span class="topi-glint"></span>
        </div>
      </div>
      <div class="topi-leg topi-leg--fl"><span class="topi-foot"></span></div>
      <div class="topi-leg topi-leg--fr"><span class="topi-foot"></span></div>
      <div class="topi-leg topi-leg--bl"><span class="topi-foot"></span></div>
      <div class="topi-leg topi-leg--br"><span class="topi-foot"></span></div>
    </div>
  </div>

  <!-- Ground bricks -->
  <div class="ground" aria-hidden="true"></div>

  <!-- Top bar -->
  <header class="topbar">
    <h1 class="title">
      <span class="title-word">EINDBAZEN</span>
      <span class="title-sub">SYNC TIMER</span>
    </h1>
    <div class="topbar-actions">
      <button id="settingsBtn" class="icon-btn" aria-label="Open settings" title="Settings">
        <span class="gear">&#9881;</span>
      </button>
      <button id="shareBtn" class="icon-btn share-icon-btn" aria-label="Copy session link" title="Share session" disabled>&#x1F517;</button>
      <button id="clockBtn" class="icon-btn" aria-label="Set end time" title="Set end time" aria-pressed="false">&#x1F551;</button>
    </div>
  </header>

  <!-- Main timer panel -->
  <main class="panel">
    <div id="timerDisplay" class="timer" data-phase="idle">
      <span id="timerValue">90</span>
      <span id="timerUnit" class="timer-unit">MIN</span>
    </div>

    <div id="endTimeDisplay" class="end-time hidden">ENDS&nbsp;<span id="endTimeValue"></span></div>

    <button id="startBtn" class="start-btn" type="button">
      <span class="start-btn-inner">START&nbsp;SYNC</span>
    </button>

    <div id="runControls" class="run-controls hidden">
      <button id="pauseBtn" class="mini-btn" type="button">Pause</button>
      <button id="resetBtn" class="mini-btn" type="button">Reset</button>
    </div>
  </main>

  <!-- Finish banner -->
  <div id="finishBanner" class="finish-banner hidden" role="alert">
    <div class="finish-text">CHECK&#8209;IN&nbsp;TIME!</div>
    <div id="slackArea" class="slack-area hidden">
      <button id="slackBtn" class="mini-btn slack-btn" type="button">Alert Slack</button>
      <span id="slackStatus" class="slack-status"></span>
    </div>
    <button id="dismissFinishBtn" class="mini-btn" type="button">Dismiss</button>
  </div>

  <!-- Confetti container -->
  <div id="confetti" class="confetti" aria-hidden="true"></div>

  <!-- Rain container (blue raindrops, separate from confetti so showers don't clobber finish coins) -->
  <div id="rainContainer" class="rain-container" aria-hidden="true"></div>

  <!-- Speech bubble (top-level so it overlays the timer panel during topi visits) -->
  <div class="bubble-layer" aria-hidden="true">
    <div class="speech-bubble speech-bubble--bug">hey a bug</div>
    <div class="speech-bubble speech-bubble--tea">tea time!</div>
  </div>

  <!-- Settings modal -->
  <dialog id="settingsDialog" class="settings-dialog">
    <form id="settingsForm" method="dialog" class="settings-form">
      <h2 class="settings-title">Settings</h2>

      <label class="field">
        <span class="field-label">Duration</span>
        <div class="stepper">
          <button type="button" class="stepper-btn" data-step="-30" aria-label="Decrease duration">&minus;</button>
          <span id="durationDisplay" class="stepper-value">90</span>
          <span class="stepper-unit">min</span>
          <button type="button" class="stepper-btn" data-step="30" aria-label="Increase duration">+</button>
        </div>
        <span class="field-help">30&ndash;240 min, in 30-min steps</span>
      </label>

      <label class="field toggle">
        <input type="checkbox" id="effectsToggle" />
        <span>Sound effects</span>
      </label>

      <label class="field toggle">
        <input type="checkbox" id="alarmToggle" />
        <span>Finish alarm</span>
      </label>

      <label class="field toggle">
        <input type="checkbox" id="roundStartToggle" />
        <span>Round start to next 5 min</span>
      </label>

      <label class="field">
        <span class="field-label">Slack alert</span>
        <select id="slackMode" class="select">
          <option value="off">Off</option>
          <option value="manual">Manual button after finish</option>
          <option value="auto">Auto-send on finish</option>
        </select>
        <span class="field-help">Webhook URL lives in Netlify env vars, not here.</span>
      </label>

      <div class="settings-section settings-section--dev">
        <h3 class="settings-section-title">Dev</h3>
        <label class="field toggle">
          <input type="checkbox" id="devModeToggle" />
          <span>Dev mode</span>
        </label>
        <div id="devControls" class="dev-controls hidden">
          <button type="button" id="triggerTopiBtn" class="mini-btn btn-secondary">&#x1F98E; Trigger topi now</button>
          <button type="button" id="triggerRsiBtn" class="mini-btn btn-secondary">&#x1F9D8; Trigger RSI break</button>
          <button type="button" id="triggerRainBtn" class="mini-btn btn-secondary">&#x1F327; Trigger rain</button>
          <button type="button" id="triggerTeaBtn" class="mini-btn btn-secondary">&#x1F375; Trigger tea time</button>
          <button type="button" id="triggerFinishBtn" class="mini-btn btn-secondary">&#x1F3C1; Trigger finish</button>
          <label class="field toggle">
            <input type="checkbox" id="fastTopiToggle" />
            <span>Fast topi schedule (5 visits in 60 s)</span>
          </label>
        </div>
      </div>

      <div class="settings-actions">
        <button type="button" id="settingsCloseBtn" class="mini-btn">Save &amp; Close</button>
      </div>
      <div class="settings-version">v<span id="appVersion"></span></div>
    </form>
  </dialog>

  <!-- Time picker dialog -->
  <dialog id="timePickerDialog" class="settings-dialog time-picker-dialog">
    <form method="dialog" class="settings-form">
      <h2 class="settings-title">End time</h2>
      <div class="time-picker">
        <div class="stepper time-stepper">
          <button type="button" class="stepper-btn" data-tp-step="hour:1" aria-label="Hour up">&#9650;</button>
          <span id="tpHourDisplay" class="stepper-value">14</span>
          <button type="button" class="stepper-btn" data-tp-step="hour:-1" aria-label="Hour down">&#9660;</button>
        </div>
        <span class="time-colon">:</span>
        <div class="stepper time-stepper">
          <button type="button" class="stepper-btn" data-tp-step="min:5" aria-label="Minute up">&#9650;</button>
          <span id="tpMinDisplay" class="stepper-value">00</span>
          <button type="button" class="stepper-btn" data-tp-step="min:-5" aria-label="Minute down">&#9660;</button>
        </div>
      </div>
      <div class="settings-actions">
        <button type="button" id="tpOkBtn" class="mini-btn">OK</button>
        <button type="button" id="tpCancelBtn" class="mini-btn btn-secondary">Cancel</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
